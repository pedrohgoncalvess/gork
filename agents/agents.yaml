agents:
  - name: conversation
    description: Agent responsible for natural conversation and chatting.
    model: deepseek/deepseek-v4-flash
    prompt_path: agents/prompts/conversation.md

  - name: filter
    description: Agent that decides whether Gork should respond to a conversation.
    model: deepseek/deepseek-v4-flash
    prompt_path: agents/prompts/filter.md

  - name: modify-image
    description: Multimodal assistant for generating or editing images.
    model: google/gemini-2.5-flash-image
    prompt_path: agents/prompts/modify-image.md

  - name: remember-formatter
    description: Agent assigned to extract dates, times, and messages to schedule reminders.
    model: deepseek/deepseek-v4-flash
    prompt_path: agents/prompts/remember-formatter.md

  - name: transcriber
    description: Agent specialized in transcribing audio files.
    model: google/gemini-2.0-flash-lite-001
    prompt_path: agents/prompts/transcriber.md

  - name: describe-image
    description: Agent responsible for describing images with WhatsApp conversation context.
    model: google/gemini-2.0-flash-lite-001
    prompt_path: agents/prompts/describe-image.md
